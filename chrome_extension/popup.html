<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1320;
      color: #e8edf5;
      margin: 0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }
    .title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 14px;
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
    }
    .dot.online {
      background: #10b981;
      box-shadow: 0 0 5px #10b981;
    }
    .info-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 10px;
      font-size: 11px;
      line-height: 1.5;
      color: #8a9bbf;
    }
    .btn-recheck {
      width: 100%;
      background: #3d7dff;
      border: none;
      color: white;
      padding: 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn-recheck:hover {
      background: #2d6aec;
    }
  </style>
  <title>Status</title>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="#3d7dff" stroke-width="2" width="18" height="18">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <div class="title">Phishing Email Analyzer</div>
  </div>
  <div class="status-row">
    <span>Local Server:</span>
    <span class="status-badge" id="statusBadge">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Checking...</span>
    </span>
  </div>
  <div class="info-box">
    Ensure the Python server is running on port 7777:
    <code style="display:block; margin-top:4px; color:#fff; font-family:monospace; background:#000; padding:3px; border-radius:3px;">python main.py --web</code>
  </div>
  <button class="btn-recheck" id="recheckBtn">Recheck Connection</button>

  <script src="popup.js"></script>
</body>
</html>
